# Frozen-denoiser + NLL-regressor configuration
# ─────────────────────────────────────────────────────────────────────
# Load ONLY the denoiser weights from a pretrained combined-model
# checkpoint, freeze them, and train a fresh regression head with
# GaussianNLLLoss (predicts mean + variance per target).
#
# Usage:
#   python cli.py fit --config configs/config_frozen_denoiser_nll.yaml
#
# Make sure to set:
#   1. encoder.init_args.denoiser_ckpt_path – path to a LitS4CombinedModel
#      checkpoint (.ckpt).  Only the ``encoder.denoiser.*`` entries are
#      loaded; the regressor is initialised from scratch.
#   2. data.init_args.data_dir – path to your HDF5 data directory.

trainer:
  accelerator: auto
  default_root_dir: 'runs/frozen_denoiser_nll/'
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
  log_every_n_steps: 1
  max_epochs: 80

data:
  class_path: src.data.data.LitCombinedDataModule
  init_args:
    inputs: ['output_ts_I', 'output_ts_Q']
    variables: ['energy_eV', 'pitch_angle_deg']
    observables: ['avg_axial_frequency_Hz', 'avg_carrier_frequency_Hz', 'radius_m']
    data_dir: '/path/to/data/'   # <-- update to your HDF5 directory
    batch_size: 128
    num_workers: 4
    cutoff: 8192
    noise_const: 1.0
    apply_filter: false
    use_curriculum_learning: false

model:
  class_path: src.models.model.LitS4CombinedModel
  init_args:
    trainer_max_epochs: 80

    # ── Freeze the denoiser ───────────────────────────────────────────
    freeze_denoiser: true

    # Only regression loss matters (denoiser gradients are blocked).
    lambda_denoise: 0.0
    lambda_regress: 1.0

    denoising_loss: 'MSELoss'          # logged only, not optimised
    loss: 'GaussianNLLLoss'            # regressor outputs mean + var

    learning_rate: 1e-3
    lr_schedule_type: reduce_on_plateau
    gamma: 0.25
    lr_patience: 5
    threshold: 1e-3
    lr_min: 1e-6

    encoder:
      class_path: src.models.networks.S4DCombinedModel
      init_args:
        d_input: 2
        # GaussianNLLLoss needs 2× the target dimension (mean + var per target).
        # With 2 regression targets (energy_eV, pitch_angle_deg) → d_output = 4.
        d_output: 4
        # Denoiser (frozen – weights loaded from combined checkpoint)
        denoiser_d_model: 128
        denoiser_n_layers: 6
        denoiser_dropout: 0.0
        denoiser_prenorm: false
        denoiser_gradient_checkpointing: false
        # Regressor (trainable, fresh init — architecture can differ from
        # whatever was in the combined checkpoint)
        regressor_d_model: 128
        regressor_n_layers: 6
        regressor_dropout: 0.0
        regressor_prenorm: false
        regressor_fc_hidden: [64, 32]
        regressor_gradient_checkpointing: false
        # ── Pretrained checkpoint ─────────────────────────────────────
        # Point at a combined checkpoint; only the denoiser slice loads.
        pretrained_ckpt_path: null
        denoiser_ckpt_path: null   # <-- set to your combined .ckpt path
        regressor_ckpt_path: null
