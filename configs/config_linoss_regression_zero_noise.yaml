# LinOSS regression-only config — mirrors best_current_config.yaml exactly
# except: LinOSSModel encoder, time-domain input (apply_fft: false), zero noise.

trainer:
  accelerator: auto
  default_root_dir: 'runs/linoss_regression_zero_noise'
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
  log_every_n_steps: 1
  max_epochs: 80

data:
  class_path: src.data.data.LitDataModule
  init_args:
    inputs: ['output_ts_I', 'output_ts_Q']
    variables: ['energy_eV', 'pitch_angle_deg']
    observables: ['avg_axial_frequency_Hz', 'avg_carrier_frequency_Hz', 'radius_m']
    batch_size: 128
    num_workers: 4
    data_dir: '/n/holystore01/LABS/iaifi_lab/Lab/creissel/neutrino_mass/combined_data_fullsim.hdf5'
    cutoff: 8192
    noise_const: 0.0   # zero noise — clean signal regression

model:
  class_path: src.models.model.LitS4Model
  init_args:
    apply_fft: false   # LinOSS processes time-domain signals, not FFT magnitude
    learning_rate: 1e-3
    lr_schedule_type: reduce_on_plateau
    gamma: 0.25
    lr_patience: 5
    threshold: 1e-3
    lr_min: 1e-6
    loss: 'MSELoss'
    encoder:
      class_path: src.models.networks.LinOSSModel
      init_args:
        d_input: 2
        d_output: 2
        d_model: 128
        n_layers: 6
        dropout: 0.0
        prenorm: False
        fc_hidden: []          # single linear decoder — same as S4D config
        ssm_size: 64
        discretization: 'IM'  # swap to 'IMEX' for symplectic (energy-conserving) dynamics
        gradient_checkpointing: false
