trainer:
  accelerator: auto
  default_root_dir: 'runs/longtracks_8kpoints_cuts_repeat'
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
  log_every_n_steps: 1
  max_epochs: 25
  accumulate_grad_batches: 8

data:
  class_path: src.data.data.LitDataModule
  init_args:
    inputs: ['output_ts_I', 'output_ts_Q']
    variables: ['energy_eV', 'pitch_angle_deg']
    observables: ['avg_axial_frequency_Hz', 'avg_carrier_frequency_Hz','radius_m']
    batch_size: 16
    pin_memory: True
    num_workers: 4
    data_dir: '/nfs/roberts/project/pi_kmh66/lfd34/project/project8/ssm/neutrino_project/data_preprocessing/shards_20bins'
    cutoff: 8192
    noise_const: 1.0
    multiplier: 5
    max_axial_freq: 7.5e6
    max_cyc_freq: 2.591e10

model:
  class_path: src.models.model.LitS4Model
  init_args:
    apply_fft: True
    learning_rate: 1e-3
    lr_schedule_type: reduce_on_plateau
    gamma: 0.25
    lr_patience: 5
    threshold: 1e-3
    lr_min: 1e-6
    loss: 'MSELoss'
    encoder:
      class_path: src.models.networks.S4DModel
      init_args:
        d_input: 2
        d_output: 2
        d_model: 128
        n_layers: 6
        dropout: 0.0
        prenorm: False
        fc_hidden: []
