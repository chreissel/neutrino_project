trainer:
  accelerator: auto
  default_root_dir: 'runs/denoising/'
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
  log_every_n_steps: 1
  max_epochs: 80

data:
  class_path: src.data.data.LitDenoisingDataModule
  init_args:
    inputs: ['output_ts_I', 'output_ts_Q']
    data_dir: '/path/to/data/'   # <-- update to your HDF5 directory
    batch_size: 128
    num_workers: 4
    cutoff: 8192
    noise_const: 1.0
    apply_filter: false
    use_curriculum_learning: false

model:
  class_path: src.models.model.LitS4DenoisingModel
  init_args:
    loss: 'MSELoss'
    learning_rate: 1e-3
    lr_schedule_type: reduce_on_plateau
    gamma: 0.25
    lr_patience: 5
    threshold: 1e-3
    lr_min: 1e-6
    encoder:
      class_path: src.models.networks.S4DSeq2SeqModel
      init_args:
        d_input: 2      # must match len(inputs)
        d_output: 2     # must match len(inputs)
        d_model: 128
        n_layers: 6
        dropout: 0.0
        prenorm: false
