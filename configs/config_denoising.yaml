trainer:
  accelerator: auto
  default_root_dir: 'runs/denoising_SpectralLoss/'
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
  log_every_n_steps: 1
  max_epochs: 20

data:
  class_path: src.data.data.LitDenoisingDataModule
  init_args:
    inputs: ['output_ts_I']
    data_dir: '/n/holystore01/LABS/iaifi_lab/Lab/hbinney/ssm_files/combined_data_20bins/'
    batch_size: 128
    num_workers: 4
    cutoff: 8192
    noise_const: 1.0
    apply_filter: false
    norm: false
    use_curriculum_learning: false

model:
  class_path: src.models.model.LitS4DenoisingModel
  init_args:
    loss: 'MixtureMSESpectralLoss'
    learning_rate: 0.5e-4
    lr_schedule_type: reduce_on_plateau
    gamma: 0.25
    lr_patience: 5
    threshold: 1e-3
    lr_min: 1e-6
    encoder:
      class_path: src.models.networks.S4DSeq2SeqModel
      init_args:
        d_input: 1
        d_output: 1
        d_model: 128
        n_layers: 6
        dropout: 0.0
        prenorm: false
        gradient_checkpointing: False
